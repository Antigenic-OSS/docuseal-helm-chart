{{- $reloadSecrets := list -}}
{{- $usesPrimarySecret := or (and (not .Values.database.url) (not .Values.database.existingSecret.enabled)) (not .Values.env.SECRET_KEY_BASE) -}}
{{- if and $usesPrimarySecret .Values.secret.create -}}
{{- $reloadSecrets = append $reloadSecrets (include "docuseal.secretName" .) -}}
{{- else if and $usesPrimarySecret .Values.secret.name -}}
{{- $reloadSecrets = append $reloadSecrets .Values.secret.name -}}
{{- end -}}
{{- if and .Values.database.existingSecret.enabled .Values.database.existingSecret.name -}}
{{- $reloadSecrets = append $reloadSecrets .Values.database.existingSecret.name -}}
{{- end -}}
{{- if and .Values.smtp.enabled .Values.smtp.username.existingSecret.enabled .Values.smtp.username.existingSecret.name -}}
{{- $reloadSecrets = append $reloadSecrets .Values.smtp.username.existingSecret.name -}}
{{- end -}}
{{- if and .Values.smtp.enabled .Values.smtp.password.existingSecret.enabled .Values.smtp.password.existingSecret.name -}}
{{- $reloadSecrets = append $reloadSecrets .Values.smtp.password.existingSecret.name -}}
{{- end -}}
{{- if and .Values.s3.enabled .Values.s3.accessKeyId.existingSecret.enabled .Values.s3.accessKeyId.existingSecret.name -}}
{{- $reloadSecrets = append $reloadSecrets .Values.s3.accessKeyId.existingSecret.name -}}
{{- end -}}
{{- if and .Values.s3.enabled .Values.s3.secretAccessKey.existingSecret.enabled .Values.s3.secretAccessKey.existingSecret.name -}}
{{- $reloadSecrets = append $reloadSecrets .Values.s3.secretAccessKey.existingSecret.name -}}
{{- end -}}
{{- if and .Values.gcs.enabled .Values.gcs.credentials.existingSecret.enabled .Values.gcs.credentials.existingSecret.name -}}
{{- $reloadSecrets = append $reloadSecrets .Values.gcs.credentials.existingSecret.name -}}
{{- end -}}
{{- if and .Values.azure.enabled .Values.azure.storageAccessKey.existingSecret.enabled .Values.azure.storageAccessKey.existingSecret.name -}}
{{- $reloadSecrets = append $reloadSecrets .Values.azure.storageAccessKey.existingSecret.name -}}
{{- end -}}
{{- $reloadSecrets = uniq (compact $reloadSecrets) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "docuseal.fullname" . }}
  labels:
    {{- include "docuseal.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: {{ .Values.strategy.type }}
  selector:
    matchLabels:
      {{- include "docuseal.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "docuseal.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if or .Values.secret.create .Values.podAnnotations (and .Values.secretReloader.enabled (gt (len $reloadSecrets) 0)) }}
      annotations:
        {{- if .Values.secret.create }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- if and .Values.secretReloader.enabled (gt (len $reloadSecrets) 0) }}
        secret.reloader.stakater.com/reload: {{ join "," $reloadSecrets | quote }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "docuseal.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: docuseal
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            {{- if .Values.database.url }}
            - name: DATABASE_URL
              value: {{ .Values.database.url | quote }}
            {{- else if .Values.database.existingSecret.enabled }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret.name | quote }}
                  key: {{ .Values.database.existingSecret.key | quote }}
            {{- else }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "docuseal.secretName" . }}
                  key: DATABASE_URL
            {{- end }}
            {{- if .Values.env.SECRET_KEY_BASE }}
            - name: SECRET_KEY_BASE
              value: {{ .Values.env.SECRET_KEY_BASE | quote }}
            {{- else }}
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: {{ include "docuseal.secretName" . }}
                  key: SECRET_KEY_BASE
            {{- end }}
            - name: FORCE_SSL
              value: {{ ternary "true" "false" .Values.general.forceSsl | quote }}
            {{- if .Values.general.host }}
            - name: HOST
              value: {{ .Values.general.host | quote }}
            {{- end }}
            {{- if .Values.smtp.enabled }}
            - name: SMTP_ADDRESS
              value: {{ .Values.smtp.address | quote }}
            - name: SMTP_PORT
              value: {{ .Values.smtp.port | quote }}
            - name: SMTP_DOMAIN
              value: {{ .Values.smtp.domain | quote }}
            - name: SMTP_AUTHENTICATION
              value: {{ .Values.smtp.authentication | quote }}
            - name: SMTP_FROM
              value: {{ .Values.smtp.from | quote }}
            - name: SMTP_ENABLE_STARTTLS
              value: {{ ternary "true" "false" .Values.smtp.enableStarttls | quote }}
            - name: SMTP_SSL_VERIFY
              value: {{ ternary "true" "false" .Values.smtp.sslVerify | quote }}
            {{ include "docuseal.envValueOrSecret" (dict "name" "SMTP_USERNAME" "value" .Values.smtp.username.value "secret" .Values.smtp.username.existingSecret) | nindent 12 }}
            {{ include "docuseal.envValueOrSecret" (dict "name" "SMTP_PASSWORD" "value" .Values.smtp.password.value "secret" .Values.smtp.password.existingSecret) | nindent 12 }}
            {{- end }}
            {{- if .Values.s3.enabled }}
            - name: AWS_REGION
              value: {{ .Values.s3.region | quote }}
            - name: S3_ATTACHMENTS_BUCKET
              value: {{ .Values.s3.attachmentsBucket | quote }}
            {{ include "docuseal.envValueOrSecret" (dict "name" "AWS_ACCESS_KEY_ID" "value" .Values.s3.accessKeyId.value "secret" .Values.s3.accessKeyId.existingSecret) | nindent 12 }}
            {{ include "docuseal.envValueOrSecret" (dict "name" "AWS_SECRET_ACCESS_KEY" "value" .Values.s3.secretAccessKey.value "secret" .Values.s3.secretAccessKey.existingSecret) | nindent 12 }}
            {{- end }}
            {{- if .Values.gcs.enabled }}
            - name: GCS_PROJECT
              value: {{ .Values.gcs.project | quote }}
            - name: GCS_BUCKET
              value: {{ .Values.gcs.bucket | quote }}
            {{ include "docuseal.envValueOrSecret" (dict "name" "GCS_CREDENTIALS" "value" .Values.gcs.credentials.value "secret" .Values.gcs.credentials.existingSecret) | nindent 12 }}
            {{- end }}
            {{- if .Values.azure.enabled }}
            - name: AZURE_STORAGE_ACCOUNT_NAME
              value: {{ .Values.azure.storageAccountName | quote }}
            - name: AZURE_CONTAINER
              value: {{ .Values.azure.container | quote }}
            {{ include "docuseal.envValueOrSecret" (dict "name" "AZURE_STORAGE_ACCESS_KEY" "value" .Values.azure.storageAccessKey.value "secret" .Values.azure.storageAccessKey.existingSecret) | nindent 12 }}
            {{- end }}
            {{- range $key, $value := .Values.env }}
            {{- if and (ne $key "SECRET_KEY_BASE") (ne $key "DATABASE_URL") (ne $key "FORCE_SSL") (ne $key "HOST") (ne $key "SMTP_USERNAME") (ne $key "SMTP_ADDRESS") (ne $key "SMTP_PORT") (ne $key "SMTP_DOMAIN") (ne $key "SMTP_PASSWORD") (ne $key "SMTP_AUTHENTICATION") (ne $key "SMTP_FROM") (ne $key "SMTP_ENABLE_STARTTLS") (ne $key "SMTP_SSL_VERIFY") (ne $key "AWS_ACCESS_KEY_ID") (ne $key "AWS_SECRET_ACCESS_KEY") (ne $key "AWS_REGION") (ne $key "S3_ATTACHMENTS_BUCKET") (ne $key "GCS_CREDENTIALS") (ne $key "GCS_PROJECT") (ne $key "GCS_BUCKET") (ne $key "AZURE_STORAGE_ACCOUNT_NAME") (ne $key "AZURE_STORAGE_ACCESS_KEY") (ne $key "AZURE_CONTAINER") }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "docuseal.fullname" . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
