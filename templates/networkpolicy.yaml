{{- if .Values.networkPolicy.enabled }}
{{- $ingressCfg := default (dict) .Values.networkPolicy.ingress }}
{{- $egressCfg := default (dict) .Values.networkPolicy.egress }}
{{- $hasSameNamespace := $ingressCfg.allowSameNamespace }}
{{- $allowIngressInternet := $ingressCfg.allowInternet }}
{{- $hasAdditionalFrom := gt (len (default (list) $ingressCfg.additionalFrom)) 0 }}
{{- $hasIngressSources := or $hasSameNamespace $allowIngressInternet $hasAdditionalFrom }}
{{- $allowDns := $egressCfg.allowDns }}
{{- $dnsTo := default (list) $egressCfg.dnsTo }}
{{- $allowEgressInternet := $egressCfg.allowInternet }}
{{- $hasAdditionalTo := gt (len (default (list) $egressCfg.additionalTo)) 0 }}
{{- $hasEgressTargets := or $allowEgressInternet $hasAdditionalTo }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "docuseal.fullname" . }}
  labels:
    {{- include "docuseal.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "docuseal.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  {{- if $hasIngressSources }}
  ingress:
    - from:
        {{- if $hasSameNamespace }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace | quote }}
        {{- end }}
        {{- if $allowIngressInternet }}
        {{- range (default (list) $ingressCfg.internetCidrs) }}
        - ipBlock:
            cidr: {{ . | quote }}
        {{- end }}
        {{- end }}
        {{- with $ingressCfg.additionalFrom }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
  {{- else }}
  ingress: []
  {{- end }}
  {{- if or $allowDns $hasEgressTargets }}
  egress:
    {{- if $allowDns }}
    - {{- if gt (len $dnsTo) 0 }}
      to:
        {{- toYaml $dnsTo | nindent 8 }}
      {{- end }}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- end }}
    {{- if $hasEgressTargets }}
    - to:
        {{- if $allowEgressInternet }}
        {{- range (default (list) $egressCfg.internetCidrs) }}
        - ipBlock:
            cidr: {{ . | quote }}
        {{- end }}
        {{- end }}
        {{- with $egressCfg.additionalTo }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    {{- end }}
  {{- else }}
  egress: []
  {{- end }}
{{- end }}
